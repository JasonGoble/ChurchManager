name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build-api:
    name: Build API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore src/FiveTalents.Api/FiveTalents.Api.csproj
      - name: Build
        run: dotnet build src/FiveTalents.Api/FiveTalents.Api.csproj -c Release --no-restore

  build-web:
    name: Build Angular
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/five-talents-web/package-lock.json
      - name: Install
        run: npm ci
        working-directory: web/five-talents-web
      - name: Build
        run: npm run build
        working-directory: web/five-talents-web
