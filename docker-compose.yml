services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: FiveTalents
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    environment:
      MP_MAX_MESSAGES: 500
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8025/"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/FiveTalents.Api/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=FiveTalents;Username=postgres;Password=postgres
      - JwtSettings__Secret=CHANGE_THIS_TO_A_LONG_RANDOM_SECRET_KEY_AT_LEAST_32_CHARS
      - JwtSettings__Issuer=FiveTalents
      - JwtSettings__Audience=FiveTalentsApp
      - AllowedOrigins__0=http://localhost:4200
      - SmtpSettings__Host=mailpit
      - SmtpSettings__Port=1025
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_healthy

  web:
    build:
      context: web/five-talents-web
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - api

volumes:
  postgres_data:
