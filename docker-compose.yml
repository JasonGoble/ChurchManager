services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: churchmanager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/ChurchManager.Api/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=churchmanager;Username=postgres;Password=postgres
      - JwtSettings__Secret=CHANGE_THIS_TO_A_LONG_RANDOM_SECRET_KEY_AT_LEAST_32_CHARS
      - JwtSettings__Issuer=ChurchManager
      - JwtSettings__Audience=ChurchManagerApp
      - AllowedOrigins__0=http://localhost:4200
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: web/church-manager-web
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - api

volumes:
  postgres_data:
